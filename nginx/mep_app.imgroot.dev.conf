# MEP attendance PWA — static SPA served from dist/
# Drop into your existing nginx (e.g. /etc/nginx/conf.d/mep_app.imgroot.dev.conf)
# then `nginx -t && nginx -s reload`.

server {
    listen 80;
    listen [::]:80;
    server_name mep_app.imgroot.dev;

    # ACME http-01 challenge (if you use certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

