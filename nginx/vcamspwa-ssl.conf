server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vcamspwa.imgroot.dev;

    ssl_certificate     /etc/letsencrypt/live/vcamspwa.imgroot.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vcamspwa.imgroot.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Path to the built `dist/` directory.
    # If nginx runs in a container, bind-mount your dist into this path.
    root /var/www/vcams-pwa;
    index index.html;

    # Security / PWA-friendly headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Camera permission must be granted to this origin for the QR scanner
    add_header Permissions-Policy "camera=(self)" always;

    # gzip (brotli too if your nginx build has ngx_brotli)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Hashed build assets — safe to cache forever
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # PWA icons / favicon
    location /icons/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /favicon.ico {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Service worker — must NOT be cached, otherwise updates never ship
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
        try_files $uri =404;
    }

    # Workbox runtime (filename is hashed but referenced by sw.js — keep it fresh)
    location ~* ^/workbox-[^/]+\.js$ {
        add_header Cache-Control "no-cache";
        expires off;
        try_files $uri =404;
    }

    # PWA manifest
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html so Vue Router can handle it.
    # index.html itself must not be cached so the user always gets the latest asset hashes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    client_max_body_size 2m;
}
