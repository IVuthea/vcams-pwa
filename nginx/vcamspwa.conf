# Vcams attendance PWA — static SPA served from dist/
# Drop into your existing nginx (e.g. /etc/nginx/conf.d/vcamspwa.imgroot.dev.conf)
# then `nginx -t && nginx -s reload`.

server {
    listen 80;
    listen [::]:80;
    server_name vcamspwa.imgroot.dev;

    root /var/www/vcams-pwa;
    index index.html;

    # ACME http-01 challenge (if you use certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html?$query_string;
        gzip_static on;
    }

    # location / {
    #     return 301 https://$host$request_uri;
    # }
}